<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GadgetZone - Product Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #6c947c;
    }
    .header {
      background-color: #b9e0cd;
      color: rgb(11, 11, 11);
      padding: 2rem 0;
      text-align: center;
    }
    .form-box, .product-box {
      background-color: white;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .alert-custom {
      background-color: #fff3cd;
      color: #856404;
      border-color: #ffeeba;
    }
    .star-rating {
      direction: rtl;
      display: inline-flex;
      font-size: 1.5rem;
    }
    .star-rating input[type="radio"] {
      display: none;
    }
    .star-rating label {
      color: #ddd;
      cursor: pointer;
    }
    .star-rating input[type="radio"]:checked ~ label {
      color: #ffc107;
    }
    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: #ffc107;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h2>GadgetZone - Product Feedback</h2>
    <p>HELP US IMPROVE YOUR EXPERIENCE</p>
  </div>

  <!-- Main Content -->
  <div class="container my-5">
    <div class="row g-4 align-items-start">
      <!-- Product Info -->
      <div class="col-lg-6">
        <div class="product-box text-center">
          <img src="fan.jpeg" alt="Voice Recognition Fan" class="img-fluid mb-3">
          <h3>Smarty Fan</h3>
          <p>Control your fan using voice commands. Enjoy hands-free comfort with smart speed and swing control.</p>
          <span class="badge bg-primary mb-2">Smart Home</span>
          <h6>Popularity</h6>
          <div class="progress">
            <div class="progress-bar bg-success" style="width: 90%">90%</div>
          </div>
        </div>
      </div>

      
      <div class="col-lg-6">
        <div class="form-box">
          <h5 class="mb-3 text-dark p-2 rounded bg-warning" >Submit Your Feedback</h5>
          <form>
            <div class="mb-3">
              <label for="name" class="form-label">Name:</label>
              <input type="text" class="form-control" id="name" placeholder="Enter your name">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email:</label>
              <input type="email" class="form-control" id="email" placeholder="Enter your email">
            </div>
            <div class="mb-3">
              <label class="form-label d-block">Rating:</label>
              <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="Excellent">★</label>
                <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="Very Good">★</label>
                <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="Good">★</label>
                <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="Fair">★</label>
                <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="Poor">★</label>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Would you recommend it?</label><br>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="recommend" id="yes" value="yes">
                <label class="form-check-label" for="yes">Yes</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="recommend" id="no" value="no">
                <label class="form-check-label" for="no">No</label>
              </div>
            </div>
            <div class="mb-3">
              <label for="comments" class="form-label">Your Comments:</label>
              <textarea class="form-control" id="comments" rows="3" placeholder="Write your review here..."></textarea>
            </div>
            <button type="submit" class="btn btn-success">Submit</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Bottom Alert -->
    <div class="alert alert-custom mt-4 text-center" role="alert">
      ⚠ Your feedback helps us serve you better!
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
